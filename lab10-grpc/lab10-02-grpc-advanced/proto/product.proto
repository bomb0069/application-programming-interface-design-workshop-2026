syntax = "proto3";

package product;

option go_package = "github.com/example/lab18-grpc-advanced/proto";

service ProductService {
  rpc GetProduct(GetProductRequest) returns (Product);
  rpc CreateProduct(CreateProductRequest) returns (Product);
  // Server-side streaming: server sends multiple products
  rpc ListProducts(ListProductsRequest) returns (stream Product);
  // Client-side streaming: client sends multiple products to create
  rpc BatchCreateProducts(stream CreateProductRequest) returns (BatchCreateResponse);
  // Bidirectional streaming: send queries, receive matching products
  rpc ProductChat(stream ProductQuery) returns (stream Product);
}

message Product {
  int32 id = 1;
  string name = 2;
  double price = 3;
  string category = 4;
}

message GetProductRequest { int32 id = 1; }
message CreateProductRequest { string name = 1; double price = 2; string category = 3; }
message ListProductsRequest { string category = 1; }
message BatchCreateResponse { int32 count = 1; repeated Product products = 2; }
message ProductQuery { string search = 1; }
