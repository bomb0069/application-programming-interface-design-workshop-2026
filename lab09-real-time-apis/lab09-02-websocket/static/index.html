<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat - Lab 16</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #16213e; padding: 15px 20px; text-align: center; }
        .header h1 { font-size: 1.3em; color: #e94560; }
        .login { display: flex; justify-content: center; align-items: center; flex: 1; }
        .login-form { background: #16213e; padding: 40px; border-radius: 10px; text-align: center; }
        .login-form h2 { margin-bottom: 20px; color: #e94560; }
        .login-form input { padding: 12px; font-size: 16px; border: 1px solid #333; border-radius: 5px; background: #0f3460; color: #eee; margin-bottom: 15px; width: 100%; }
        .login-form button { padding: 12px 30px; font-size: 16px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .chat-container { display: none; flex: 1; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .message.system { text-align: center; color: #888; font-style: italic; max-width: 100%; }
        .message.user { background: #16213e; }
        .message .username { color: #e94560; font-weight: bold; font-size: 0.85em; }
        .message .content { margin-top: 4px; }
        .message .time { color: #666; font-size: 0.75em; margin-top: 4px; }
        .input-area { display: flex; padding: 15px; background: #16213e; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; font-size: 16px; border: 1px solid #333; border-radius: 5px; background: #0f3460; color: #eee; }
        .input-area button { padding: 12px 25px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>WebSocket Chat</h1></div>

    <div class="login" id="loginScreen">
        <div class="login-form">
            <h2>Enter Chat</h2>
            <input type="text" id="usernameInput" placeholder="Your username..." maxlength="20">
            <button onclick="connect()">Join Chat</button>
        </div>
    </div>

    <div class="chat-container" id="chatScreen">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let ws;

        function connect() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return;

            const wsUrl = `ws://${window.location.host}/ws?username=${encodeURIComponent(username)}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                document.getElementById('messageInput').focus();
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                addMessage(msg);
            };

            ws.onclose = () => {
                addMessage({ type: 'system', content: 'Disconnected from server' });
            };
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !ws) return;
            ws.send(JSON.stringify({ content }));
            input.value = '';
        }

        function addMessage(msg) {
            const div = document.createElement('div');
            div.className = `message ${msg.type}`;

            if (msg.type === 'system') {
                div.textContent = msg.content;
            } else {
                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : '';
                div.innerHTML = `<div class="username">${escapeHtml(msg.username)}</div><div class="content">${escapeHtml(msg.content)}</div><div class="time">${time}</div>`;
            }

            const messages = document.getElementById('messages');
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
